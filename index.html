<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز رفع السكربتات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00aaff; --bg: #050505; --card: #111; --text: #fff; --red: #ff3131; --green: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
        .page { display: none; width: 100%; max-width: 480px; padding: 25px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: var(--card); padding: 35px; border-radius: 30px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; }
        h1 { color: var(--primary); font-size: 24px; margin-bottom: 20px; }
        textarea, input { width: 100%; background: #181818; border: 1px solid #333; border-radius: 15px; padding: 15px; color: white; margin-bottom: 15px; outline: none; transition: 0.3s; text-align: center; font-size: 14px; }
        input.invalid { border-color: var(--red) !important; box-shadow: 0 0 10px rgba(255,49,49,0.3); }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.3s; font-size: 16px; }
        .btn:disabled { background: #333; cursor: not-allowed; color: #777; }
        .social-btn { display: none; align-items: center; justify-content: space-between; background: var(--red); margin-bottom: 12px; border: none; color: white; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; position: relative; }
        .social-btn.completed { background: var(--green) !important; color: #000 !important; cursor: default; pointer-events: none; }
        .loader { width: 22px; height: 22px; border: 3px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: none; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .unlock-btn { display: none; background: var(--green); color: #000; margin-top: 20px; font-size: 18px; }
        .script-display { background: #000; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); color: #00ff88; text-align: left; font-family: monospace; white-space: pre-wrap; margin: 20px 0; overflow-y: auto; max-height: 200px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="step1" class="page active">
        <div class="glass-card">
            <h1>مرحباً بك</h1>
            <p style="margin-bottom: 15px; color: #888;">ضع سكربتك أو رابطك لـرفعه</p>
            <textarea id="mainInput" rows="6" placeholder="loadstring(...) أو https://..."></textarea>
            <button class="btn" onclick="validateStep1()">إدخال</button>
        </div>
    </div>

    <div id="step2" class="page">
        <div class="glass-card">
            <h1>إعداد الاشتراك</h1>
            <input type="text" id="link_tiktok" placeholder="رابط تيك توك" oninput="validateLinks()">
            <input type="text" id="link_youtube" placeholder="رابط يوتيوب" oninput="validateLinks()">
            <input type="text" id="link_discord" placeholder="رابط ديسكورد" oninput="validateLinks()">
            <input type="text" id="link_insta" placeholder="رابط انستقرام" oninput="validateLinks()">
            <button id="genBtn" class="btn" onclick="generateShortLink()">إنشاء رابط قصير</button>
        </div>
    </div>

    <div id="lockPage" class="page">
        <div class="glass-card">
            <h1>اشتراك إجباري</h1>
            <div id="btnList"></div>
            <button id="mainUnlock" class="btn unlock-btn" onclick="openFinal()">إلغاء القفل</button>
        </div>
    </div>

    <div id="finalPage" class="page">
        <div class="glass-card">
            <h1>تم التحقق بنجاح</h1>
            <div class="script-display" id="scriptContent"></div>
            <button class="btn" onclick="copyFinal()">نسخ السكربت</button>
        </div>
    </div>

    <script>
        let scriptData = "";
        const domains = { tiktok: 'tiktok.com', youtube: 'youtube.com', discord: 'discord', insta: 'instagram.com' };

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function validateStep1() {
            let val = document.getElementById('mainInput').value;
            if (val.startsWith('loadstring') || val.startsWith('https://')) {
                scriptData = val; show('step2');
            } else { alert("يجب أن يبدأ بـ loadstring أو https://"); }
        }

        function validateLinks() {
            let valid = true;
            const check = (id, domain) => {
                let el = document.getElementById('link_'+id);
                if (el.value && !el.value.toLowerCase().includes(domain)) {
                    el.classList.add('invalid'); valid = false;
                } else { el.classList.remove('invalid'); }
            };
            check('tiktok', domains.tiktok); check('youtube', domains.youtube); check('discord', domains.discord); check('insta', domains.insta);
            document.getElementById('genBtn').disabled = !valid;
        }

        async function generateShortLink() {
            let btn = document.getElementById('genBtn');
            btn.innerText = "جاري الاختصار...";
            let config = { s: scriptData, tk: document.getElementById('link_tiktok').value, yt: document.getElementById('link_youtube').value, dc: document.getElementById('link_discord').value, ig: document.getElementById('link_insta').value };
            let encoded = btoa(unescape(encodeURIComponent(JSON.stringify(config))));
            let longUrl = window.location.origin + window.location.pathname + "?data=" + encoded;

            try {
                // استخدام بروكسي لتجاوز قيود CORS والوصول لـ is.gd
                const proxyUrl = 'https://tinyurl.com/api-create.php?url=';
                const response = await fetch(proxyUrl + encodeURIComponent(longUrl));
                const shortUrl = await response.text();

                if (shortUrl.startsWith('http')) {
                    navigator.clipboard.writeText(shortUrl);
                    alert("تم إنشاء الرابط القصير بنجاح ونسخه:\n" + shortUrl);
                } else { throw new Error(); }
            } catch (e) {
                // إذا فشل الأول، نحاول بـ is.gd مباشرة (قد يتطلب متصفح حديث)
                try {
                    const res = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`);
                    const data = await res.text();
                    if(data.startsWith('http')) {
                        navigator.clipboard.writeText(data);
                        alert("تم نسخ الرابط القصير من خادم بديل!");
                    } else { throw new Error(); }
                } catch(err) {
                    navigator.clipboard.writeText(longUrl);
                    alert("فشل الاختصار التلقائي، تم نسخ الرابط الطويل مؤقتاً.");
                }
            }
            btn.innerText = "إنشاء رابط قصير";
        }

        window.onload = function() {
            let params = new URLSearchParams(window.location.search);
            if (params.has('data')) {
                let data = JSON.parse(decodeURIComponent(escape(atob(params.get('data')))));
                startLock(data);
            }
        };

        function startLock(data) {
            show('lockPage');
            window.finalScript = data.s;
            let list = document.getElementById('btnList');
            let platforms = [
                { l: data.tk, n: 'تيك توك', i: 'fa-tiktok' },
                { l: data.yt, n: 'يوتيوب', i: 'fa-youtube' },
                { l: data.dc, n: 'ديسكورد', i: 'fa-discord' },
                { l: data.ig, n: 'انستقرام', i: 'fa-instagram' }
            ].filter(p => p.l);

            if(platforms.length === 0) return openFinal();

            platforms.forEach((p, index) => {
                let b = document.createElement('button');
                b.className = "social-btn";
                b.innerHTML = `<span>${p.n}</span> <div class="loader"></div> <i class="fa-brands ${p.i}"></i>`;
                if(index === 0) b.style.display = "flex";

                b.onclick = function() {
                    window.open(p.l, '_blank');
                    let loader = b.querySelector('.loader');
                    let icon = b.querySelector('.fa-brands');
                    loader.style.display = "block"; icon.style.display = "none";
                    b.style.pointerEvents = "none";

                    setTimeout(() => {
                        loader.style.display = "none";
                        b.classList.add('completed');
                        b.innerHTML = `<span>${p.n} (تم)</span> <i class="fa-solid fa-check"></i>`;
                        let next = list.children[index+1];
                        if(next) next.style.display = "flex";
                        else document.getElementById('mainUnlock').style.display = "block";
                    }, 7000);
                };
                list.appendChild(b);
            });
        }

        function openFinal() { show('finalPage'); document.getElementById('scriptContent').innerText = window.finalScript; }
        function copyFinal() { navigator.clipboard.writeText(window.finalScript); alert("تم النسخ!"); }
    </script>
</body>
</html>
