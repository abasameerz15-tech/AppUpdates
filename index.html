<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع تنزيل من تيك توك</title>
    <!-- استدعاء أيقونات FontAwesome لشكل الحافظة والتليجرام -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #121212 0%, #1f1f1f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden; /* لمنع التمرير بالخلفية عند ظهور القفل */
        }

        /* ستايل شاشة القفل التليجرام */
        .telegram-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .telegram-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 136, 204, 0.3); /* لون تليجرام */
            padding: 40px 30px;
            border-radius: 24px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .telegram-card i.fa-telegram {
            font-size: 4.5rem;
            color: #0088cc;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .telegram-card h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .telegram-card p {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 136, 204, 0.4);
        }

        .tg-btn:hover {
            background: #0077b3;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.6);
        }

        /* ستايل محتوى الموقع الرئيسي */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fe2c55, #25f4ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            padding-left: 60px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: left;
            direction: ltr;
        }

        input[type="text"]:focus {
            border-color: #fe2c55;
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.3);
        }

        .paste-btn {
            position: absolute;
            left: 10px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .paste-btn:hover {
            background: #25f4ee;
            color: #000;
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            background: #fe2c55;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(254, 44, 85, 0.4);
        }

        .download-btn:hover {
            background: #e11d43;
            transform: translateY(-2px);
        }

        .download-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            margin-top: 20px;
            font-size: 1rem;
            color: #25f4ee;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- قائمة القفل والاشتراك بالتليجرام أولاً -->
    <div class="telegram-overlay" id="telegramOverlay">
        <div class="telegram-card">
            <i class="fa-brands fa-telegram"></i>
            <h2>الرجاء الاشتراك بقناتنا على تيليجرام أولاً</h2>
            <p>للاستفادة من خدمة تحميل فيديوهات تيك توك بدون علامة مائية فوراً وبالمجان، يرجى دعمنا بالانضمام للقناة أولاً.</p>
            <a href="https://t.me/SZSTORE0_1" target="_blank" class="tg-btn" id="subscribeBtn">
                <i class="fa-brands fa-telegram"></i> اشتراك الآن
            </a>
        </div>
    </div>

    <!-- محتويات الموقع الرئيسي -->
    <div class="container">
        <h1>مرحباً بك</h1>
        <p class="subtitle">في موقع تنزيل من تيك توك بدون علامة مائية</p>

        <div class="input-group">
            <input type="text" id="tiktokUrl" placeholder="أدخل أو الصق رابط فيديو تيك توك هنا...">
            <button class="paste-btn" id="pasteBtn" title="لصق من الحافظة">
                <i class="fa-regular fa-clipboard"></i>
            </button>
        </div>

        <button class="download-btn" id="downloadBtn">تحميل الفيديو فوراً</button>

        <div class="status" id="statusMessage"></div>
    </div>

    <script>
        const telegramOverlay = document.getElementById('telegramOverlay');
        const subscribeBtn = document.getElementById('subscribeBtn');
        const tiktokUrlInput = document.getElementById('tiktokUrl');
        const pasteBtn = document.getElementById('pasteBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusMessage = document.getElementById('statusMessage');

        // ميزة فك قفل الموقع بعد الضغط على زر الاشتراك
        subscribeBtn.addEventListener('click', () => {
            // إخفاء قائمة القفل بتأثير حركي أنيق
            telegramOverlay.style.opacity = '0';
            telegramOverlay.style.pointerEvents = 'none';
            // إعادة السماح بالتمرير في الموقع الرئيسي
            document.body.style.overflow = 'auto';
            
            setTimeout(() => {
                telegramOverlay.style.display = 'none';
            }, 500);
        });

        // 1. ميزة زر الحافظة (Paste)
        pasteBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                tiktokUrlInput.value = text;
                statusMessage.innerText = "تم اللصق بنجاح ✅";
                setTimeout(() => statusMessage.innerText = "", 2000);
            } catch (err) {
                statusMessage.innerText = "عذراً، يرجى إعطاء صلاحية اللصق للموقع ❌";
            }
        });

        // 2. ميزة الضغط على Enter لبدء التحميل
        tiktokUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                startDownload();
            }
        });

        downloadBtn.addEventListener('click', startDownload);

        // وظيفة جلب الفيديو وتحميله مباشرة للجهاز
        async function startDownload() {
            const url = tiktokUrlInput.value.trim();
            
            if (!url) {
                statusMessage.innerText = "الرجاء إدخال رابط أولاً! ⚠️";
                return;
            }

            statusMessage.innerText = "جاري استخراج الفيديو بدون علامة مائية... ⏳";
            downloadBtn.disabled = true;

            try {
                const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    const videoUrl = data.data.play; 
                    
                    statusMessage.innerText = "جاري بدء التحميل المباشر للجهاز... 🚀";

                    const videoResponse = await fetch(videoUrl);
                    const blob = await videoResponse.blob(); 
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    const tempLink = document.createElement('a');
                    tempLink.href = blobUrl;
                    tempLink.download = `TikTok-${Date.now()}.mp4`; 
                    document.body.appendChild(tempLink);
                    tempLink.click(); 
                    
                    document.body.removeChild(tempLink);
                    window.URL.revokeObjectURL(blobUrl);

                    statusMessage.innerText = "تم تحميل الفيديو بنجاح! 🎉";
                } else {
                    statusMessage.innerText = "فشل جلب الفيديو، تأكد من صحة الرابط. ❌";
                }
            } catch (error) {
                statusMessage.innerText = "حدث خطأ أثناء تحميل الملف، يرجى المحاولة مجدداً. ❌";
                console.error(error);
            } finally {
                downloadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
