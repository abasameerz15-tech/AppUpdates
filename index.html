<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع تنزيل من تيك توك</title>
    <!-- استدعاء أيقونات FontAwesome لشكل الحافظة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #121212 0%, #1f1f1f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fe2c55, #25f4ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            padding-left: 60px; /* ترك مساحة لزر اللصق جهة اليسار */
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: left; /* لأن روابط تيك توك تكتب من اليسار لليمين */
            direction: ltr;
        }

        input[type="text"]:focus {
            border-color: #fe2c55;
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.3);
        }

        /* زر الحافظة داخل صندوق النص */
        .paste-btn {
            position: absolute;
            left: 10px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .paste-btn:hover {
            background: #25f4ee;
            color: #000;
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            background: #fe2c55;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(254, 44, 85, 0.4);
        }

        .download-btn:hover {
            background: #e11d43;
            transform: translateY(-2px);
        }

        .download-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            margin-top: 20px;
            font-size: 1rem;
            color: #25f4ee;
        }

        /* تنسيق كرت النتيجة عند التحميل */
        .result-card {
            margin-top: 25px;
            display: none;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .result-card a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #25f4ee;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مرحباً بك</h1>
        <p class="subtitle">في موقع تنزيل من تيك توك بدون علامة مائية</p>

        <div class="input-group">
            <input type="text" id="tiktokUrl" placeholder="أدخل أو الصق رابط فيديو تيك توك هنا...">
            <!-- زر الحافظة (لصق) -->
            <button class="paste-btn" id="pasteBtn" title="لصق من الحافظة">
                <i class="fa-regular fa-clipboard"></i>
            </button>
        </div>

        <button class="download-btn" id="downloadBtn">تحميل الفيديو</button>

        <div class="status" id="statusMessage"></div>
        
        <!-- مكان ظهور الفيديو الجاهز للتحميل -->
        <div class="result-card" id="resultCard">
            <p>تم تجهيز الفيديو بنجاح!</p>
            <a id="downloadLink" href="#" target="_blank" download>اضغط هنا لحفظ الفيديو المباشر</a>
        </div>
    </div>

    <script>
        const tiktokUrlInput = document.getElementById('tiktokUrl');
        const pasteBtn = document.getElementById('pasteBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusMessage = document.getElementById('statusMessage');
        const resultCard = document.getElementById('resultCard');
        const downloadLink = document.getElementById('downloadLink');

        // 1. ميزة زر الحافظة (Paste)
        pasteBtn.addEventListener('click', async () => {
            try {
                // تطلب الإذن من المتصفح للقراءة من الحافظة
                const text = await navigator.clipboard.readText();
                tiktokUrlInput.value = text;
                statusMessage.innerText = "تم اللصق بنجاح ✅";
                setTimeout(() => statusMessage.innerText = "", 2000);
            } catch (err) {
                statusMessage.innerText = "عذراً، يرجى إعطاء صلاحية اللصق للموقع ❌";
                console.error('فشل القراءة من الحافظة: ', err);
            }
        });

        // 2. ميزة الضغط على Enter لبدء التحميل
        tiktokUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // منع السلوك الافتراضي لـ Enter
                startDownload();
            }
        });

        // عند الضغط على زر التحميل الملون
        downloadBtn.addEventListener('click', startDownload);

        // وظيفة جلب الفيديو وتحميله
        async function startDownload() {
            const url = tiktokUrlInput.value.trim();
            
            if (!url) {
                statusMessage.innerText = "الرجاء إدخال رابط أولاً! ⚠️";
                return;
            }

            statusMessage.innerText = "جاري معالجة الرابط وجلب الفيديو بدون علامة مائية... ⏳";
            downloadBtn.disabled = true;
            resultCard.style.display = "none";

            try {
                // استخدام API مجانية خارجية لتحليل روابط تيك توك
                const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    // الرابط المباشر للفيديو بدون علامة مائية
                    const videoWithoutWatermark = data.data.play; 
                    
                    statusMessage.innerText = "جاهز للتحميل! 🎉";
                    downloadLink.href = videoWithoutWatermark;
                    resultCard.style.display = "block";
                    
                    // فتح الرابط في تبويب جديد تلقائياً لبدء التحميل
                    window.open(videoWithoutWatermark, '_blank');
                } else {
                    statusMessage.innerText = "فشل جلب الفيديو. تأكد من أن الرابط صحيح وحساب صاحب الفيديو ليس خاصاً. ❌";
                }
            } catch (error) {
                statusMessage.innerText = "حدث خطأ أثناء الاتصال بالسيرفر، يرجى المحاولة لاحقاً. ❌";
                console.error(error);
            } finally {
                downloadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
