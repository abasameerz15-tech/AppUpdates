<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روليت الأسماء الاحترافي</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 30px; }

        /* منطقة العجلة */
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 40px auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--card);
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            background: conic-gradient(#334155 0deg 360deg);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
        }

        /* أدوات التحكم */
        .controls {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: grid;
            gap: 15px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            width: 80%;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-spin { 
            background: var(--secondary); 
            color: white; 
            font-size: 1.2rem;
            width: 100%;
            margin-top: 10px;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* عرض النتيجة */
        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #22c55e;
            min-height: 2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎡 روليت الحظ الاحترافي</h1>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel"></canvas>
    </div>

    <div id="result"></div>

    <div class="controls">
        <div>
            <input type="text" id="nameInput" placeholder="اكتب الاسم للإضافة...">
            <button class="btn-add" onclick="addName()">إضافة للعجلة</button>
        </div>

        <div>
            <input type="text" id="deleteInput" placeholder="اكتب الاسم لحذفه واضغط Enter..." onkeypress="handleDelete(event)">
            <button class="btn-delete" onclick="deleteName()">حذف اسم</button>
        </div>

        <button class="btn-spin" onclick="spinWheel()">🚀 تدوير العجلة!</button>
    </div>
</div>

<script>
    let names = JSON.parse(localStorage.getItem('rouletteNames')) || ["أحمد", "سارة", "محمد", "نورة"];
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    let currentRotation = 0;

    function drawWheel() {
        const size = 350;
        canvas.width = size;
        canvas.height = size;
        const center = size / 2;
        const radius = size / 2;
        const sliceAngle = (2 * Math.PI) / (names.length || 1);

        ctx.clearRect(0, 0, size, size);

        if (names.length === 0) {
            ctx.fillStyle = "#334155";
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, 2 * Math.PI);
            ctx.fill();
            return;
        }

        names.forEach((name, i) => {
            const angle = i * sliceAngle;
            
            // رسم الشريحة
            ctx.beginPath();
            ctx.fillStyle = `hsl(${i * (360 / names.length)}, 70%, 50%)`;
            ctx.moveTo(center, center);
            ctx.arc(center, center, radius, angle, angle + sliceAngle);
            ctx.fill();
            ctx.stroke();

            // إضافة النص
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(angle + sliceAngle / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(name, radius - 20, 10);
            ctx.restore();
        });
    }

    function addName() {
        const input = document.getElementById('nameInput');
        if (input.value.trim()) {
            names.push(input.value.trim());
            saveAndRefresh();
            input.value = '';
        }
    }

    function deleteName() {
        const input = document.getElementById('deleteInput');
        const nameToDelete = input.value.trim();
        const index = names.indexOf(nameToDelete);
        if (index > -1) {
            names.splice(index, 1);
            saveAndRefresh();
            input.value = '';
        } else {
            alert("الاسم غير موجود!");
        }
    }

    function handleDelete(e) {
        if (e.key === 'Enter') deleteName();
    }

    function saveAndRefresh() {
        localStorage.setItem('rouletteNames', JSON.stringify(names));
        drawWheel();
    }

    function spinWheel() {
        if (names.length < 2) {
            alert("يرجى إضافة اسمين على الأقل!");
            return;
        }

        const extraDegrees = Math.floor(Math.random() * 360) + 1440; // 4 دورات على الأقل
        currentRotation += extraDegrees;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        document.getElementById('result').innerText = "جاري الاختيار...";

        setTimeout(() => {
            const actualRotation = currentRotation % 360;
            const sliceAngle = 360 / names.length;
            // الحساب لاختيار الاسم الصحيح بناءً على السهم العلوي
            const winningIndex = Math.floor((360 - (actualRotation % 360)) / sliceAngle) % names.length;
            document.getElementById('result').innerText = "الفائز هو: " + names[winningIndex];
        }, 4000);
    }

    // التشغيل الأول
    drawWheel();
</script>

</body>
</html>
